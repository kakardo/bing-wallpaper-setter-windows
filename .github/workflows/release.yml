name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install ps2exe
        shell: powershell
        run: Install-Module ps2exe -Scope CurrentUser -Force -AllowClobber

      - name: Build BingWallpaperSetup.exe
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v') + '.0'
          Invoke-ps2exe .\BingWallpaperSetup.ps1 .\BingWallpaperSetup.exe `
            -title "Bing Wallpaper Setter for Windows" `
            -description "Setup and management tool for Bing Wallpaper Setter. By Kardo Rostam." `
            -product "Bing Wallpaper Setter for Windows" `
            -version $version `
            -requireAdmin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: BingWallpaperSetup.exe
          generate_release_notes: true
