name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install ps2exe
        shell: powershell
        run: Install-Module ps2exe -Scope CurrentUser -Force -AllowClobber

      - name: Build Setup.exe
        shell: powershell
        run: Invoke-ps2exe .\Setup.ps1 .\Setup.exe -title "Bing Wallpaper Setter"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Setup.exe
          generate_release_notes: true
